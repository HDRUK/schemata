title: organisation
type: object
examples: []
properties:
  id:
    type: string
    format: uuid
    readOnly: true
  identifiers:
    type: array
    items:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
  name:
    type: string
  address:
    type: string
  city:
    type: string
  postcode:
    type: string
  country:
    type: string
    description: ISO 3166-1 alpha-3
  type:
    oneOf:
      - enum:
          - Academic Institution
          - National Body
          - Healthcare Provider
          - Healthcare Commisioner
          - Commercial Body
          - Local Authority
      - {}
    type: string
  sector:
    type: string
  size:
    type: string
  contact:
    type: object
    properties:
      name:
        type: string
      email:
        type: string
      telephone:
        type: string
required:
  - name
